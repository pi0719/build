    <script>
        // Unity가 만드는 모든 <video> element 강제 muted + play() 로그
        (function () {
            const _origCreate = document.createElement.bind(document);
            document.createElement = function (tagName, options) {
                const el = _origCreate(tagName, options);
                if (tagName && typeof tagName === 'string' && tagName.toLowerCase() === 'video') {
                    try {
                        el.muted = true;
                        el.defaultMuted = true;
                        el.volume = 0;
                        el.playsInline = true;
                        el.setAttribute('muted', '');
                        el.setAttribute('playsinline', '');
                        el.setAttribute('webkit-playsinline', '');
                        console.log('[VideoMute] createElement video auto-muted');
                    } catch (e) {
                        console.warn('[VideoMute] patch failed:', e);
                    }
                }
                return el;
            };
            const muteIfVideo = (node) => {
                if (!node) return;
                if (node.nodeName === 'VIDEO' && node.id !== 'webcam-video') {
                    try {
                        node.muted = true;
                        node.defaultMuted = true;
                        node.volume = 0;
                        node.setAttribute('muted', '');
                    } catch (e) { }
                }
                if (node.querySelectorAll) {
                    node.querySelectorAll('video').forEach(v => {
                        if (v.id !== 'webcam-video') {
                            try {
                                v.muted = true;
                                v.defaultMuted = true;
                                v.volume = 0;
                                v.setAttribute('muted', '');
                            } catch (e) { }
                        }
                    });
                }
            };
            const observer = new MutationObserver((mutations) => {
                mutations.forEach(m => m.addedNodes.forEach(muteIfVideo));
            });
            const startObserving = () => {
                if (document.body) {
                    observer.observe(document.body, { childList: true, subtree: true });
                } else {
                    setTimeout(startObserving, 10);
                }
            };
            startObserving();
            // ============================================
            // play() 진단 패치: 어떤 오류로 실패하는지 로그
            // ============================================
            const _origPlay = HTMLVideoElement.prototype.play;
            HTMLVideoElement.prototype.play = function () {
                const result = _origPlay.apply(this, arguments);
                if (result && typeof result.then === 'function') {
                    return result.catch((err) => {
                        if (this.id !== 'webcam-video') {
                            console.warn('[VideoPlay FAIL]', err.name + ':', err.message, '| muted=', this.muted, 'src=', (this.src || '').slice(-15));
                        }
                        throw err;
                    });
                }
                return result;
            };
            // ============================================
            // 전역 touchstart: 어디든 탭하면 모든 멈춘 영상 재생 시도
            // (iOS 기본 패턴 - 한번 탭하면 그 세션 전체 unlock)
            // ============================================
            const tryPlayAll = () => {
                document.querySelectorAll('video').forEach(v => {
                    if (v.id !== 'webcam-video' && v.paused && v.src) {
                        const p = v.play();
                        if (p && p.catch) p.catch(() => { });
                    }
                });
            };
            document.addEventListener('touchstart', tryPlayAll, { passive: true });
            document.addEventListener('click', tryPlayAll, { passive: true });
        })();
    </script>

    <script>
        (function () {
            let _bgTimestamp = 0;
            const RELOAD_THRESHOLD_MS = 1500;
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden') {
                    _bgTimestamp = Date.now();
                } else if (document.visibilityState === 'visible' && _bgTimestamp > 0) {
                    const elapsedMs = Date.now() - _bgTimestamp;
                    if (elapsedMs > RELOAD_THRESHOLD_MS) {
                        location.reload();
                    }
                }
            });
            window.addEventListener('pageshow', function (e) {
                if (e.persisted) {
                    location.reload();
                }
            });
        })();
    </script>

    <script>
            var initialize = async() =>{
                var unityCanvas = document.querySelector("#unity-canvas");
                var videoCanvas = document.querySelector("#video-canvas");
                window.arCamera = new ARCamera(unityCanvas, videoCanvas);
                window.iTracker = new ImageTracker(arCamera);
                try{
                    await window.iTracker.initialize("./opencv.js");
                    console.log("ImageTracker initialized!");
                }
                catch{
                    console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
                    ShowError("Failed to initialize the experience.");
                    return;
                }
                await LoadWebcams();
                document.getElementById("startARButton").style.display = "block";
                window.permissionsGranted = IsCameraPermissionGranted();
            }
            initialize();
            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
        async function preloadVideos() {
            console.log("[VideoPreload] 영상 사전 로드 시작...");
            for (let i = 1; i <= 15; i++) {
                const filename = String(i).padStart(2, '0') + '.mp4';
                const url = `StreamingAssets/${filename}`;
                try {
                    const response = await fetch(url, { cache: 'reload' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const blob = await response.blob();
                    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
                    console.log(`[VideoPreload] ✅ ${filename} 캐시 완료 (${sizeMB}MB)`);
                } catch (err) {
                    console.warn(`[VideoPreload] ❌ ${filename} 실패: ${err.message}`);
                }
            }
            console.log("[VideoPreload] 🎉 전체 사전 로드 완료!");
        }
            function StartAR() {
                document.getElementById("startARDiv").style.display = "none";
                createUnityInstance(document.querySelector("#unity-canvas"), {
                    dataUrl: "Build/build.data",
                    frameworkUrl: "Build/build.framework.js",
                    codeUrl: "Build/build.wasm",
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "DefaultCompany",
                    productName: "Bukchon_AR795_3",
                    productVersion: "0.1",
                    },
                    (progress) => {
                        progressBarFull.style.width = 100 * progress + "%";
                    }
                ).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    if(window.permissionsGranted)
                        RequestWebcam();
                    loadingBar.style.display = "none";
                    preloadVideos();
                });
                loadingBar.style.display = "block";
            }
            function StartARExperience() {
                console.log("[StartARExperience] User clicked AR 시작 — fresh gesture");
                document.getElementById('startARDiv2').classList.remove('show');
                // === Dummy video element 만들어서 play() 시도 ===
                // 이게 성공하면 iOS document-level video 권한 unlock됨
                // (Unity가 나중에 만드는 element도 영향 받기를 기대)
                try {
                    const dummy = document.createElement('video');
                    dummy.muted = true;
                    dummy.playsInline = true;
                    dummy.setAttribute('muted', '');
                    dummy.setAttribute('playsinline', '');
                    dummy.setAttribute('webkit-playsinline', '');
                    dummy.src = 'StreamingAssets/01.mp4';
                    dummy.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none';
                    document.body.appendChild(dummy);
                    const playPromise = dummy.play();
                    if (playPromise) {
                        playPromise.then(() => {
                            console.log('[Prewarm] ✅ dummy unlock succeeded — iOS video permission unlocked');
                            setTimeout(() => {
                                try {
                                    dummy.pause();
                                    dummy.remove();
                                } catch (e) {}
                            }, 200);
                        }).catch(err => {
                            console.warn('[Prewarm] ❌ dummy unlock FAILED:', err.name, err.message);
                            try { dummy.remove(); } catch (e) {}
                        });
                    }
                } catch (e) {
                    console.warn('[Prewarm] exception:', e);
                }
                // 기존 video element도 play 시도
                document.querySelectorAll('video').forEach(v => {
                    if (v.id !== 'webcam-video') {
                        const playPromise = v.play();
                        if (playPromise) {
                            playPromise.catch(err => {});
                        }
                    }
                });
            }
		window.unityFacingMode = "environment"
            window.WEBCAM_SETTINGS = {
                video: {
        facingMode: unityFacingMode,
        width: { ideal: 1280 },
        height: { ideal: 720 }
    },
                audio: false
            };
            window.requestingForPermissions = false;
            async function RequestWebcam(){
                window.requestingForPermissions = true;
                try{
                    window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                    console.log("Webcam access granted");
                    requestingForPermissions = false;
                    StopWebcam();
                }
                catch (err) {
                    console.error("getUserMedia error - " , err);
                    ShowError("Failed to start the experience. Camera permission was denied");
                    window.requestingForPermissions = false;
                }
            }
            function StopWebcam(){
                console.log("stopping camera");
                window.webcamStream.getTracks().forEach(track => track.stop());
            }
            async function StartWebcam(){
                console.log("StartWebcam")
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                while (window.requestingForPermissions) {
                    console.log("Waiting for permissions...");
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                console.log("Got Permissions");
                if(window.webcamStream)
                {
                    const video = document.querySelector("#webcam-video");
                    video.srcObject = webcamStream;
                    try {
                        await arCamera.startWebcam(video);
                        console.log("Webcam started successfully");
                        document.getElementById('startARDiv2').classList.add('show');
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamSuccess');
                    }
                    catch(err){
                        console.error("Webcam failed to start - ", err);
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                    }
                }
                else{
                    console.error("Webcam failed to start - permission not yet granted");
                    window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                }
            }
            async function LoadWebcams(){
                let camDevices = [];
                let devices = await navigator.mediaDevices.enumerateDevices();
                var ctr = 0;
                devices.forEach(mediaDevice => {
                    if (mediaDevice.kind === 'videoinput') {
                        if(window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')){
                            camDevices.push(mediaDevice);
                        }
                        else if(window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')){
                            camDevices.push(mediaDevice);
                        }
                        else{
                            camDevices.push(mediaDevice);
                        }
                        ctr++;
                    }
                });
                var select = document.getElementById("chooseCamSel");
                select.style.display = "block";
                var count = 0;
                camDevices = camDevices.reverse();
                camDevices.forEach(mediaDevice => {
                    const option = document.createElement('option');
                    option.value = mediaDevice.deviceId;
                    let label = `Camera ${count}`;
                    if (mediaDevice.label) {
                        label = mediaDevice.label
                    }
                    const textNode = document.createTextNode(label);
                    option.appendChild(textNode);
                    select.appendChild(option);
                    count++;
                });
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            function SelectCam(){
                var select = document.getElementById("chooseCamSel");
                window.deviceId = select.value;
                window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            async function FlipCam(){
                arCamera.stopWebcam();
                window.WEBCAM_SETTINGS.video.deviceId = '';
                if(window.WEBCAM_SETTINGS.video.facingMode == 'user'){
                    window.WEBCAM_SETTINGS.video.facingMode = 'environment';
                    arCamera.setFlipped(false);
                }
                else{
                    window.WEBCAM_SETTINGS.video.facingMode = 'user';
                    arCamera.setFlipped(true);
                }
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;
                await arCamera.startWebcam(video);
            }
            async function IsCameraPermissionGranted() {
                if (!navigator.permissions || !navigator.mediaDevices) {
                    return false;
                }
                try {
                    const permissionStatus = await navigator.permissions.query({ name: "camera" });
                    if (permissionStatus.state === "granted") {
                    return true;
                    } else if (permissionStatus.state === "prompt") {
                    return false;
                    } else {
                    return false;
                    }
                } catch (error) {
                    return false;
                }
            }
            function ShowError(error){
                document.getElementById("errorDiv").style.display = "flex";
                document.getElementById("errorText").innerHTML = error;
            }
            function ShowScreenshot(dataUrl){
                document.getElementById("screenshotDiv").style.display = "flex";
                document.getElementById("screenshotImg").src = dataUrl;
                document.getElementById("screenshotImg").style.width = "80vw";
                document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
            }
            function ShowConfirmUrl(url){
                document.getElementById("confirmUrlDiv").style.display = "flex";
                window.newUrlString = url;
                document.getElementById("confirmUrlText").innerText = "Are you sure you want to visit " + url;
            }
            window.ITRACKER_GLOBALS = {
                INTERNAL_SMOOTHFACTOR_POS: .075,
            }
    </script>
